name: profile-versions

# Keeps the release tags shown in profile/README.md in sync with the official
# repositories. Versions live between `<!-- v:OWNER/REPO -->...<!-- /v -->`
# markers; this refreshes them and opens a PR when a tag changes.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  # Optional instant trigger: a release workflow can
  # `POST /repos/Glyndor/.github/dispatches` with event_type "release".
  repository_dispatch:
    types: [release]

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      FILE: profile/README.md
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4

      - name: Refresh versions from latest releases
        id: refresh
        run: |
          set -euo pipefail
          repos=$(grep -oE '<!-- v:[A-Za-z0-9._/-]+' "$FILE" | sed 's/<!-- v://' | sort -u)
          for repo in $repos; do
            tag=$(gh api "repos/$repo/releases/latest" --jq '.tag_name' 2>/dev/null || true)
            [ -z "$tag" ] && continue
            sed -i "s|<!-- v:$repo -->[^<]*<!-- /v -->|<!-- v:$repo -->$tag<!-- /v -->|" "$FILE"
          done
          if git diff --quiet "$FILE"; then
            echo "changed=0" >> "$GITHUB_OUTPUT"
          else
            echo "changed=1" >> "$GITHUB_OUTPUT"
            git --no-pager diff "$FILE"
          fi

      - name: Open pull request
        if: steps.refresh.outputs.changed == '1'
        # GITHUB_TOKEN cannot open PRs under the org policy; supply a scoped
        # token (fine-grained PAT or App) as VERSION_BOT_TOKEN to enable it.
        env:
          GH_TOKEN: ${{ secrets.VERSION_BOT_TOKEN || github.token }}
        run: |
          set -euo pipefail
          branch="chore/profile-versions-${{ github.run_id }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add "$FILE"
          git commit -s -m "chore: sync release versions in profile README"
          git push origin "$branch"
          gh pr create \
            --base develop \
            --head "$branch" \
            --title "chore: sync release versions in profile README" \
            --body "Automated refresh of the release tags shown on the organization profile." \
            --label "type:chore,prio:P3,effort:XS,status:ready"
