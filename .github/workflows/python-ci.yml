name: Python CI (reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing the Python project
        type: string
        default: "."
      python-version:
        description: Python version
        type: string
        default: "3.13"

permissions:
  contents: read

jobs:
  ci:
    name: Lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install tooling and project
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f pyproject.toml ] || [ -f setup.py ]; then pip install -e .; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: ruff (lint)
        run: ruff check .

      - name: ruff (format)
        run: ruff format --check .

      - name: pytest
        run: |
          if ls tests/ test/ 2>/dev/null | grep -q .; then pytest; else echo "No tests directory — skipping"; fi
