name: Python CI (reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing the Python project
        type: string
        default: "."
      python-version:
        description: Python version
        type: string
        default: "3.13"
      ruff-version:
        description: ruff version to pin (empty = latest)
        type: string
        default: ""
      pytest-version:
        description: pytest version to pin (empty = latest)
        type: string
        default: ""
      coverage-threshold:
        description: Minimum coverage percentage (0 disables the gate; uses pytest-cov)
        type: number
        default: 0

permissions:
  contents: read

concurrency:
  group: python-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      RUFF_VERSION: ${{ inputs.ruff-version }}
      PYTEST_VERSION: ${{ inputs.pytest-version }}
      THRESHOLD: ${{ inputs.coverage-threshold }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install tooling and project
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "ruff${RUFF_VERSION:+==$RUFF_VERSION}" "pytest${PYTEST_VERSION:+==$PYTEST_VERSION}"
          if [ "$THRESHOLD" != "0" ]; then pip install pytest-cov; fi
          if [ -f pyproject.toml ] || [ -f setup.py ]; then pip install -e .; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: ruff (lint)
        run: ruff check .

      - name: ruff (format)
        run: ruff format --check .

      - name: pytest
        if: ${{ inputs.coverage-threshold == 0 }}
        run: |
          if ls tests/ test/ 2>/dev/null | grep -q .; then pytest; else echo "No tests directory — skipping"; fi

      - name: pytest with coverage gate
        if: ${{ inputs.coverage-threshold > 0 }}
        run: |
          if ls tests/ test/ 2>/dev/null | grep -q .; then
            pytest --cov --cov-report=term-missing --cov-fail-under="$THRESHOLD"
          else
            echo "::error::coverage gate enabled but no tests directory found"
            exit 1
          fi
