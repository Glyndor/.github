name: Python CI (reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing the Python project
        type: string
        default: "."
      python-version:
        description: Python version
        type: string
        default: "3.13"
      # Tool versions default to a pin, not to latest: an unpinned ruff/pytest
      # would change lint/test behaviour for every Python consumer the day a
      # new release ships, with no per-repo buffer. Bump the pins via a new
      # `.github` release so the change is reviewable per repo.
      ruff-version:
        description: ruff version to pin
        type: string
        default: "0.12.0"
      pytest-version:
        description: pytest version to pin
        type: string
        default: "8.4.0"
      coverage-threshold:
        description: Minimum coverage percentage (0 disables the gate; uses pytest-cov)
        type: number
        default: 0

permissions:
  contents: read

concurrency:
  group: python-ci-${{ github.workflow }}-${{ github.ref }}-${{ inputs.working-directory }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      RUFF_VERSION: ${{ inputs.ruff-version }}
      PYTEST_VERSION: ${{ inputs.pytest-version }}
      THRESHOLD: ${{ inputs.coverage-threshold }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ inputs.python-version }}
          # `cache: pip` fails outright when no dependency file exists, even
          # though the install step below handles that case — only enable the
          # cache when there is something to key it on.
          cache: ${{ hashFiles('**/requirements.txt', '**/pyproject.toml', '**/setup.py') != '' && 'pip' || '' }}

      - name: Install tooling and project
        run: |
          set -euo pipefail
          [ -n "$RUFF_VERSION" ] || { echo "::error::ruff-version must not be empty"; exit 1; }
          [ -n "$PYTEST_VERSION" ] || { echo "::error::pytest-version must not be empty"; exit 1; }
          python -m pip install --upgrade pip
          pip install "ruff==$RUFF_VERSION" "pytest==$PYTEST_VERSION"
          if [ "$THRESHOLD" != "0" ]; then pip install pytest-cov; fi
          if [ -f pyproject.toml ] || [ -f setup.py ]; then pip install -e .; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: ruff (lint)
        run: ruff check .

      - name: ruff (format)
        run: ruff format --check .

      - name: pytest
        if: ${{ inputs.coverage-threshold == 0 }}
        run: |
          if [ -d tests ] || [ -d test ]; then pytest; else echo "::warning::no tests directory found — test job is a no-op"; fi

      - name: pytest with coverage gate
        if: ${{ inputs.coverage-threshold > 0 }}
        run: |
          if [ -d tests ] || [ -d test ]; then
            pytest --cov --cov-report=term-missing --cov-fail-under="$THRESHOLD"
          else
            echo "::error::coverage gate enabled but no tests directory found"
            exit 1
          fi
