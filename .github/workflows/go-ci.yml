name: Go CI (reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing the Go module
        type: string
        default: "."
      coverage-threshold:
        description: Minimum coverage percentage (0 disables the gate)
        type: number
        default: 0

permissions:
  contents: read

concurrency:
  group: go-ci-${{ github.workflow }}-${{ github.ref }}-${{ inputs.working-directory }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: ${{ inputs.working-directory }}/go.mod
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: gofmt
        run: |
          set -euo pipefail
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Files not gofmt-formatted:" && echo "$UNFORMATTED" && exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Tests with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage gate
        if: inputs.coverage-threshold > 0
        env:
          THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          PCT=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')
          echo "### Coverage: ${PCT}% (threshold: ${THRESHOLD}%)" >> "$GITHUB_STEP_SUMMARY"
          awk -v p="$PCT" -v t="$THRESHOLD" 'BEGIN { exit (p >= t) ? 0 : 1 }'
