name: Go CI (reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing the Go module
        type: string
        default: "."
      coverage-threshold:
        description: Minimum coverage percentage (0 disables the gate)
        type: number
        default: 0

permissions:
  contents: read

jobs:
  ci:
    name: Lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: ${{ inputs.working-directory }}/go.mod
          cache-dependency-path: ${{ inputs.working-directory }}/go.sum

      - name: gofmt
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "Files not gofmt-formatted:" && echo "$UNFORMATTED" && exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Tests with coverage
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage gate
        if: inputs.coverage-threshold > 0
        run: |
          PCT=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')
          echo "### Coverage: ${PCT}% (threshold: ${{ inputs.coverage-threshold }}%)" >> "$GITHUB_STEP_SUMMARY"
          awk -v p="$PCT" -v t="${{ inputs.coverage-threshold }}" 'BEGIN { exit (p >= t) ? 0 : 1 }'
