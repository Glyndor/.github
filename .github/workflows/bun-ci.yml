name: Bun CI (reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing package.json
        type: string
        default: "."
      bun-version:
        description: Bun version (pin a major for reproducibility)
        type: string
        default: "1"
      coverage-threshold:
        description: Minimum line coverage percentage (0 disables the gate; uses bun test --coverage)
        type: number
        default: 0

permissions:
  contents: read

concurrency:
  group: bun-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run --if-present lint

      - name: Build
        run: bun run --if-present build

      - name: Test
        if: ${{ inputs.coverage-threshold == 0 }}
        run: bun run --if-present test

      - name: Test with coverage gate
        if: ${{ inputs.coverage-threshold > 0 }}
        env:
          THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          set -euo pipefail
          # bun writes the coverage table to stderr, so capture both streams.
          bun test --coverage --coverage-reporter=text 2>&1 | tee coverage.txt
          # Locate the "% Lines" column from the header (bun emits
          # File | % Funcs | % Lines | Uncovered), then read it off "All files".
          PCT=$(awk -F'|' '
            /% Funcs/ && /% Lines/ {
              for (i = 1; i <= NF; i++) { h = $i; gsub(/^ +| +$/, "", h); if (h == "% Lines") col = i }
            }
            /All files/ && col { v = $col; gsub(/ /, "", v); print v }
          ' coverage.txt)
          if [ -z "$PCT" ]; then
            echo "::error::could not parse coverage from bun test output"
            exit 1
          fi
          echo "### Coverage: ${PCT}% (threshold: ${THRESHOLD}%)" >> "$GITHUB_STEP_SUMMARY"
          awk -v p="$PCT" -v t="$THRESHOLD" 'BEGIN { exit (p >= t) ? 0 : 1 }'
