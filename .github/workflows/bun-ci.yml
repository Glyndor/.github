name: Bun CI (reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        description: Directory containing package.json
        type: string
        default: "."
      bun-version:
        description: Bun version (pin a major for reproducibility)
        type: string
        default: "1"
      coverage-threshold:
        description: Minimum line coverage percentage (0 disables the gate; uses bun test --coverage)
        type: number
        default: 0

permissions:
  contents: read

concurrency:
  group: bun-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ inputs.bun-version }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint --if-present

      - name: Build
        run: bun run build --if-present

      - name: Test
        if: ${{ inputs.coverage-threshold == 0 }}
        run: bun run test --if-present

      - name: Test with coverage gate
        if: ${{ inputs.coverage-threshold > 0 }}
        env:
          THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          set -euo pipefail
          bun test --coverage --coverage-reporter=text | tee coverage.txt
          PCT=$(awk -F'|' '/All files/ {gsub(/ /,"",$4); print $4}' coverage.txt)
          if [ -z "$PCT" ]; then
            echo "::error::could not parse coverage from bun test output"
            exit 1
          fi
          echo "### Coverage: ${PCT}% (threshold: ${THRESHOLD}%)" >> "$GITHUB_STEP_SUMMARY"
          awk -v p="$PCT" -v t="$THRESHOLD" 'BEGIN { exit (p >= t) ? 0 : 1 }'
